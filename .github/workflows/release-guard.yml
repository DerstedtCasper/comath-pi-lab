name: Release Guard

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:

jobs:
  fail-closed-ga-guard:
    name: fail-closed GA release guard
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack pnpm --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt
          corepack pnpm install --frozen-lockfile

      - name: Repository release readiness
        run: corepack pnpm release:check

      - name: External GA blocker evidence
        run: corepack pnpm external:check
