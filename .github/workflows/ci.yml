name: CI

on:
  push:
    branches:
      - main
      - production-formal-workbench
  pull_request:
  workflow_dispatch:

jobs:
  build-test-release-check:
    name: build, typecheck, test, release gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Lean
        run: |
          $ErrorActionPreference = "Stop"
          $toolchain = (Get-Content -Raw lean-toolchain).Trim()
          Invoke-WebRequest -Uri "https://elan.lean-lang.org/elan-init.ps1" -OutFile "elan-init.ps1"
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          .\elan-init.ps1 -NoPrompt 1 -DefaultToolchain $toolchain
          Remove-Item -LiteralPath "elan-init.ps1"
          "$env:USERPROFILE\.elan\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\.elan\bin\lean.exe" --version

      - name: Enable Corepack
        run: |
          corepack enable
          corepack pnpm --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt
          corepack pnpm install --frozen-lockfile

      - name: Build
        run: corepack pnpm build

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Test
        run: corepack pnpm test

      - name: Release readiness gate
        run: corepack pnpm release:check
